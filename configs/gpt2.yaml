distributed:
    tp_size: 2
    cp_size: 1
    pp_size: 1
    dp_size: 1
    pp_engine: "1f1b"

model:
    name: "gpt2"
    tokenizer: "tokenizer_gpt2_2000"
    # eager: 手写 attention，适合教学与追踪每一步张量流
    # sdpa:  使用 PyTorch 官方 scaled_dot_product_attention 后端
    attention_backend: "sdpa"
    # activation checkpointing 会在反向时重算 block 前向，减少激活显存占用。
    activation_checkpointing: false
    vocab_size: 2000
    block_size: 32
    embed_dim: 4
    num_heads: 2
    num_layers: 4

training:
    seed: 42
    learning_rate: 0.0003
    total_train_steps: 20000
    micro_batch_size: 4
    gradient_accumulation_steps: 2
    num_samples: 400000
    max_tokens: null
    use_fused_adam: false
    # 开启后在 CUDA 上使用 autocast；dtype 由运行时自动选择。
    use_autocast: false
    # 当前只建议在单卡 CUDA dense 路径打开 compile。
    use_torch_compile: false
    torch_compile_mode: "reduce-overhead"

dataset:
    # random: 用随机 token 做并行与吞吐基线
    # hf:     走真实 HuggingFace dataset，验证训练闭环
    loader: "random"
    name: "roneneldan/TinyStories"
    subset_name: null
    num_workers: 0
    num_proc: 4

checkpoint:
    save_dir: "tmp/gpt2"
    save_frequency: 300
    load_path: ""

logging:
    use_wandb: false
    project_name: "multigpt"
    run_name: "multigpt"

profiling:
    enabled: false
    output_dir: "tmp/profiler"
    wait: 1
    warmup: 1
    active: 2
    repeat: 1
    record_shapes: true
    profile_memory: true
    with_stack: false

environment:
    OMP_NUM_THREADS: "1"
    TOKENIZERS_PARALLELISM: "false"
